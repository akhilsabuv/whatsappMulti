<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp File Sender Widget</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #25D366;
            --primary-dark: #128C7E;
            --bg: #f0f2f5;
            --card-bg: #ffffff;
            --text: #111b21;
            --text-secondary: #667781;
            --border: #e9edef;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .widget-card {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h2 {
            margin-top: 0;
            font-weight: 600;
            color: var(--primary-dark);
        }

        p {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
        }

        .input-group {
            margin-bottom: 1.2rem;
            text-align: left;
        }

        label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 0.4rem;
            color: var(--text-secondary);
        }

        input[type="text"], 
        input[type="file"] {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 12px;
            box-sizing: border-box;
            font-family: inherit;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--primary);
        }

        .btn-send {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.2s, transform 0.1s;
            margin-top: 1rem;
        }

        .btn-send:hover {
            background-color: var(--primary-dark);
        }

        .btn-send:active {
            transform: scale(0.98);
        }

        .btn-send:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        #status {
            margin-top: 1.5rem;
            padding: 12px;
            border-radius: 12px;
            font-size: 0.85rem;
            display: none;
        }

        .status-success {
            background-color: #dcf8c6;
            color: #075e54;
            display: block !important;
        }

        .status-error {
            background-color: #ffebee;
            color: #c62828;
            display: block !important;
        }

        .loader {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            margin-right: 8px;
            vertical-align: middle;
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="widget-card">
    <h2>Send WhatsApp File</h2>
    <p>Upload a document, image, or video to any number.</p>

    <div class="input-group">
        <label for="phone">Recipient Phone Number</label>
        <input type="text" id="phone" placeholder="e.g. 917561834993" value="917561834993">
    </div>

    <div class="input-group">
        <label for="caption">Caption (Optional)</label>
        <input type="text" id="caption" placeholder="Enter message caption..." value="Product brochure">
    </div>

    <div class="input-group">
        <label for="file">Select File</label>
        <input type="file" id="file">
    </div>

    <button id="sendBtn" class="btn-send">
        <span class="loader"></span>
        <span class="btn-text">Send File</span>
    </button>

    <div id="status"></div>
</div>

<script>
    const API_KEY = 'AIzacBYEfJernn-Cous7P5RJdR2xsrv6TL419WC';
    const API_URL = 'http://localhost:3001/api/messages/send-file';

    $(document).ready(function() {
        $('#sendBtn').on('click', function() {
            const phone = $('#phone').val().trim();
            const caption = $('#caption').val().trim();
            const fileInput = $('#file')[0];
            
            if (!phone) {
                showStatus('Please enter a phone number', 'error');
                return;
            }

            if (!fileInput.files || fileInput.files.length === 0) {
                showStatus('Please select a file to upload', 'error');
                return;
            }

            // Prepare form data
            const formData = new FormData();
            formData.append('to', phone);
            if (caption) formData.append('caption', caption);
            
            // CRITICAL: Only append the file field ONCE to avoid 400 Bad Request
            formData.append('file', fileInput.files[0]);

            // UI feedback
            setLoading(true);
            hideStatus();

            // Perform the request
            $.ajax({
                url: API_URL,
                type: 'POST',
                headers: {
                    'X-API-Key': API_KEY
                },
                data: formData,
                processData: false, // Required for FormData
                contentType: false,  // Required for FormData
                success: function(response) {
                    console.log('Success:', response);
                    showStatus('File queued successfully! Job ID: ' + response.jobId, 'success');
                },
                error: function(xhr) {
                    console.error('Error:', xhr);
                    let errMsg = 'Failed to send file.';
                    try {
                        const resp = JSON.parse(xhr.responseText);
                        errMsg = resp.message || errMsg;
                        if (Array.isArray(errMsg)) errMsg = errMsg.join(', ');
                    } catch(e) {}
                    showStatus(errMsg, 'error');
                },
                complete: function() {
                    setLoading(false);
                }
            });
        });

        function showStatus(msg, type) {
            $('#status').text(msg).removeClass().addClass(type === 'success' ? 'status-success' : 'status-error');
        }

        function hideStatus() {
            $('#status').hide();
        }

        function setLoading(isLoading) {
            if (isLoading) {
                $('#sendBtn').prop('disabled', true);
                $('.loader').show();
                $('.btn-text').text('Sending...');
            } else {
                $('#sendBtn').prop('disabled', false);
                $('.loader').hide();
                $('.btn-text').text('Send File');
            }
        }
    });
</script>

</body>
</html>

name: Deploy to Lightsail

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: lightsail-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Configure SSH
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${{ vars.SSH_PORT || '22' }}" "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Back up production database
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ vars.SSH_PORT || '22' }}
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH || '/opt/whatsapp' }}
          BACKUP_REPO: git@github.com:akhilsabuv/whatsappMultiBackupDB.git
          BACKUP_REPO_SSH_KEY: ${{ secrets.BACKUP_REPO_SSH_KEY }}
        run: |
          set -euo pipefail

          timestamp="$(date -u +%Y%m%d-%H%M%S)"
          backup_file="whatsapp-platform-${timestamp}.dump"
          backup_path="$RUNNER_TEMP/$backup_file"

          if ! ssh -i ~/.ssh/deploy_key -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "test -f '$DEPLOY_PATH/.env' && test -f '$DEPLOY_PATH/docker-compose.prod.yml'"; then
            echo "No existing production deployment found; skipping database backup."
            exit 0
          fi

          ssh -i ~/.ssh/deploy_key -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" \
            "cd '$DEPLOY_PATH' && set -a && . ./.env && set +a && docker compose -f docker-compose.prod.yml exec -T postgres pg_dump -U \"\$POSTGRES_USER\" -d \"\$POSTGRES_DB\" --format=custom --no-owner --no-privileges" \
            > "$backup_path"

          if [ ! -s "$backup_path" ]; then
            echo "Database backup was empty."
            exit 1
          fi

          if [ -z "$BACKUP_REPO_SSH_KEY" ]; then
            echo "BACKUP_REPO_SSH_KEY is not configured; database backup was created on the runner but not pushed to the backup repository."
            exit 0
          fi

          backup_key="$RUNNER_TEMP/backup_repo_key"
          printf '%s\n' "$BACKUP_REPO_SSH_KEY" > "$backup_key"
          chmod 600 "$backup_key"
          export GIT_SSH_COMMAND="ssh -i $backup_key -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new"

          backup_repo_dir="$RUNNER_TEMP/backup-repo"
          git clone "$BACKUP_REPO" "$backup_repo_dir"
          cd "$backup_repo_dir"
          git checkout -B main
          mkdir -p database
          cp "$backup_path" "database/$backup_file"
          cat > latest.json <<JSON
          {
            "filename": "$backup_file",
            "createdAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "sourceHost": "$SSH_HOST"
          }
          JSON
          git config user.name "whatsapp-db-backup"
          git config user.email "actions@github.com"
          git add database latest.json
          git commit -m "Back up database $timestamp"
          git push origin main

      - name: Upload release
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ vars.SSH_PORT || '22' }}
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH || '/opt/whatsapp' }}
        run: |
          set -euo pipefail
          tar \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.npm-cache' \
            --exclude='.next' \
            --exclude='dist' \
            --exclude='.env' \
            --exclude='.env.*' \
            --exclude='certbot' \
            --exclude='*.pem' \
            -czf /tmp/whatsapp-release.tgz .
          ssh -i ~/.ssh/deploy_key -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "sudo mkdir -p '$DEPLOY_PATH' && sudo chown '$SSH_USER:$SSH_USER' '$DEPLOY_PATH'"
          scp -i ~/.ssh/deploy_key -P "$SSH_PORT" /tmp/whatsapp-release.tgz "$SSH_USER@$SSH_HOST:/tmp/whatsapp-release.tgz"

      - name: Deploy with Docker Compose
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ vars.SSH_PORT || '22' }}
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH || '/opt/whatsapp' }}
          DOMAIN: wcp.aiesys.in
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/deploy_key -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" \
            "DEPLOY_PATH='$DEPLOY_PATH' DOMAIN='$DOMAIN' SERVER_IP='$SSH_HOST' bash -s" <<'REMOTE'
          set -euo pipefail

          cd "$DEPLOY_PATH"

          if ! command -v docker >/dev/null 2>&1; then
            curl -fsSL https://get.docker.com | sudo sh
            sudo usermod -aG docker "$USER" || true
          fi

          release_dir="$(mktemp -d)"
          tar -xzf /tmp/whatsapp-release.tgz -C "$release_dir"

          set_env_var() {
            key="$1"
            value="$2"
            file="$3"
            if grep -q "^${key}=" "$file"; then
              sed -i "s|^${key}=.*|${key}=${value}|" "$file"
            else
              printf '%s=%s\n' "$key" "$value" >> "$file"
            fi
          }

          existing_new_env=false
          if [ -f .env ] && grep -q '^WHATSAPP_PLATFORM_ENV_VERSION=1$' .env; then
            existing_new_env=true
            cp .env "$release_dir/.env"
          else
            if [ -f .env ]; then
              cp .env ".env.backup.$(date +%Y%m%d%H%M%S)"
            fi

            postgres_password="$(openssl rand -hex 24 | tr -d '\n')"
            jwt_secret="$(openssl rand -base64 48 | tr -d '\n')"
            encryption_secret="$(openssl rand -hex 16 | tr -d '\n')"
            superadmin_password="$(openssl rand -hex 18 | tr -d '\n')"
            admin_password="$(openssl rand -hex 18 | tr -d '\n')"

            cat > "$release_dir/.env" <<ENV
          WHATSAPP_PLATFORM_ENV_VERSION=1
          NODE_ENV=production
          POSTGRES_DB=whatsapp_platform
          POSTGRES_USER=postgres
          POSTGRES_PASSWORD=$postgres_password
          DATABASE_URL=postgresql://postgres:$postgres_password@postgres:5432/whatsapp_platform?schema=public
          REDIS_URL=redis://redis:6379
          JWT_SECRET=$jwt_secret
          ENCRYPTION_SECRET=$encryption_secret
          PUBLIC_APP_URL=https://$DOMAIN
          PUBLIC_API_URL=https://$DOMAIN
          ALLOWED_ORIGINS=https://$DOMAIN,http://$SERVER_IP
          NEXT_PUBLIC_API_URL=
          NEXT_PUBLIC_SOCKET_URL=
          SUPERADMIN_EMAIL=owner@$DOMAIN
          SUPERADMIN_PASSWORD=$superadmin_password
          DEFAULT_ADMIN_EMAIL=admin@$DOMAIN
          DEFAULT_ADMIN_PASSWORD=$admin_password
          ENABLE_SWAGGER=false
          FILE_MAX_MB=10
          UPLOAD_DIR=/shared/uploads
          MOCK_WHATSAPP=false
          PORTAL_TOKEN_TTL=24h
          CLAMSCAN_PATH=
          REQUIRE_MALWARE_SCAN=false
          CLAMSCAN_TIMEOUT_MS=30000
          ALERT_WEBHOOK_URL=
          DEAD_LETTER_RETAIN_COUNT=500
          ENV
            chmod 600 "$release_dir/.env"
          fi

          set_env_var PUBLIC_APP_URL "https://$DOMAIN" "$release_dir/.env"
          set_env_var PUBLIC_API_URL "https://$DOMAIN" "$release_dir/.env"
          set_env_var ALLOWED_ORIGINS "https://$DOMAIN,http://$SERVER_IP" "$release_dir/.env"
          set_env_var NEXT_PUBLIC_API_URL "" "$release_dir/.env"
          set_env_var NEXT_PUBLIC_SOCKET_URL "" "$release_dir/.env"
          set_env_var BACKUP_RETAIN_COUNT "14" "$release_dir/.env"

          if [ -f docker-compose.prod.yml ]; then
            docker compose -f docker-compose.prod.yml down --remove-orphans || true
          elif [ -f docker-compose.yml ]; then
            if [ "$existing_new_env" = "true" ]; then
              docker compose -f docker-compose.yml down --remove-orphans || true
            else
              docker compose -f docker-compose.yml down --volumes --remove-orphans || true
            fi
          fi

          find "$DEPLOY_PATH" -mindepth 1 -maxdepth 1 ! -name '.env' ! -name 'certbot' -exec rm -rf {} +
          cp -a "$release_dir"/. "$DEPLOY_PATH"/
          rm -rf "$release_dir"

          if [ ! -f "certbot/conf/live/$DOMAIN/fullchain.pem" ]; then
            docker run --rm \
              -p 80:80 \
              -v "$DEPLOY_PATH/certbot/conf:/etc/letsencrypt" \
              -v "$DEPLOY_PATH/certbot/www:/var/www/certbot" \
              certbot/certbot certonly \
              --standalone \
              --non-interactive \
              --agree-tos \
              --register-unsafely-without-email \
              -d "$DOMAIN"
          fi

          renewal_file="certbot/conf/renewal/$DOMAIN.conf"
          if [ -f "$renewal_file" ]; then
            sudo sed -i 's/^authenticator = .*/authenticator = webroot/' "$renewal_file"
            if sudo grep -q '^webroot_path =' "$renewal_file"; then
              sudo sed -i 's|^webroot_path = .*|webroot_path = /var/www/certbot|' "$renewal_file"
            else
              sudo sed -i '/^authenticator = webroot/a webroot_path = /var/www/certbot' "$renewal_file"
            fi
          fi

          docker compose -f docker-compose.prod.yml up --build -d
          docker compose -f docker-compose.prod.yml ps
          REMOTE

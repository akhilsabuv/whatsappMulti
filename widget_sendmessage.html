<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Message Sender Widget</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #25D366;
            --primary-dark: #128C7E;
            --bg: #f0f2f5;
            --card-bg: #ffffff;
            --text: #111b21;
            --text-secondary: #667781;
            --border: #e9edef;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .widget-card {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h2 {
            margin-top: 0;
            font-weight: 600;
            color: var(--primary-dark);
        }

        p {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
        }

        .input-group {
            margin-bottom: 1.2rem;
            text-align: left;
        }

        label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 0.4rem;
            color: var(--text-secondary);
        }

        input[type="text"],
        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 12px;
            box-sizing: border-box;
            font-family: inherit;
            transition: border-color 0.2s;
            font-size: 0.95rem;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        input[type="text"]:focus,
        textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        .btn-send {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.2s, transform 0.1s;
            margin-top: 1rem;
        }

        .btn-send:hover {
            background-color: var(--primary-dark);
        }

        .btn-send:active {
            transform: scale(0.98);
        }

        .btn-send:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        #status {
            margin-top: 1.5rem;
            padding: 12px;
            border-radius: 12px;
            font-size: 0.85rem;
            display: none;
            word-break: break-all;
        }

        .status-success {
            background-color: #dcf8c6;
            color: #075e54;
            display: block !important;
        }

        .status-error {
            background-color: #ffebee;
            color: #c62828;
            display: block !important;
        }

        .loader {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, .3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            margin-right: 8px;
            vertical-align: middle;
            display: none;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>

    <div class="widget-card">
        <h2>Send WhatsApp Message</h2>
        <p>Send a text message instantly using the API.</p>

        <div class="input-group">
            <label for="phone">Recipient Phone Number</label>
            <input type="text" id="phone" placeholder="e.g. 917561834993" value="917561834993">
        </div>

        <div class="input-group">
            <label for="message">Message Text</label>
            <textarea id="message"
                placeholder="Type your message here...">Hello from the WhatsApp Platform API</textarea>
        </div>

        <button id="sendBtn" class="btn-send">
            <span class="loader"></span>
            <span class="btn-text">Send Message</span>
        </button>

        <div id="status"></div>
    </div>

    <script>
        const API_KEY = 'AIzaT4zAv8C4wHXva6nYKfzX5x8VChkIv9voQ2M';
        const API_URL = 'http://localhost:3001/api/messages/send-text';

        $(document).ready(function () {
            $('#sendBtn').on('click', function () {
                const phone = $('#phone').val().trim();
                const message = $('#message').val().trim();

                if (!phone) {
                    showStatus('Please enter a phone number', 'error');
                    return;
                }

                if (!message) {
                    showStatus('Please enter a message', 'error');
                    return;
                }

                // UI feedback
                setLoading(true);
                hideStatus();

                // Perform the request
                $.ajax({
                    url: API_URL,
                    type: 'POST',
                    headers: {
                        'X-API-Key': API_KEY,
                        'Content-Type': 'application/json'
                    },
                    data: JSON.stringify({
                        to: phone,
                        text: message
                    }),
                    success: function (response) {
                        console.log('Success:', response);
                        showStatus('Message queued successfully! Job ID: ' + response.jobId, 'success');
                    },
                    error: function (xhr) {
                        console.error('Error:', xhr);
                        let errMsg = 'Failed to send message.';
                        try {
                            const resp = JSON.parse(xhr.responseText);
                            errMsg = resp.message || errMsg;
                            if (Array.isArray(errMsg)) errMsg = errMsg.join(', ');
                        } catch (e) { }
                        showStatus(errMsg, 'error');
                    },
                    complete: function () {
                        setLoading(false);
                    }
                });
            });

            function showStatus(msg, type) {
                $('#status').text(msg).removeClass().addClass(type === 'success' ? 'status-success' : 'status-error');
            }

            function hideStatus() {
                $('#status').hide();
            }

            function setLoading(isLoading) {
                if (isLoading) {
                    $('#sendBtn').prop('disabled', true);
                    $('.loader').show();
                    $('.btn-text').text('Sending...');
                } else {
                    $('#sendBtn').prop('disabled', false);
                    $('.loader').hide();
                    $('.btn-text').text('Send Message');
                }
            }
        });
    </script>

</body>

</html>
